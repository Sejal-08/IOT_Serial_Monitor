<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Selection - Serial Monitor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #6269f0 0%, #4b6cb7 50%, #6b8af7 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .login-container {
    background: linear-gradient(135deg, #e6ebf7 20%, #e0e7ff 50%, #89a1f0 50%);
    border: 2px solid #e0e7ff;
    border-radius: 20px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
    max-width: 900px;
    width: 100%;
    padding: 50px;
    text-align: center;
    animation: slideIn 0.5s ease-out;
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(-30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .logo {
    font-size: 4rem;
    color: #4b6cb7;
    margin-bottom: 20px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  h1 {
    color: #2d4060;
    font-size: 2.5rem;
    margin-bottom: 10px;
    font-weight: 700;
  }

  .subtitle {
    color: #1e293b;
    font-size: 1.1rem;
    margin-bottom: 50px;
  }

  .device-selection {
    display: flex;
    gap: 30px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }

  .device-card {
    background: linear-gradient(135deg, #7690e5, #b0bde3);
    border: 3px solid #e0e7ff;
    border-radius: 15px;
    padding: 40px 30px;
    width: 280px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
  }

  .device-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
  }

  .device-card:hover::before {
    left: 100%;
  }

  .device-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 8px 20px rgba(75, 108, 183, 0.3);
    border-color: #6b8af7;
  }

  .device-card.selected {
    border-color: #6b8af7;
    background: linear-gradient(135deg, #43379e 0%, #4b6cb7 50%, #6b8af7 100%);
    color: white;
    transform: scale(1.05);
  }

  .device-card.selected .device-icon {
    color: white;
  }

  .device-card.selected .device-name,
  .device-card.selected .device-description {
    color: white;
  }

  .device-icon {
    font-size: 5rem;
    margin-bottom: 20px;
    transition: all 0.3s ease;
  }

  .device-card:nth-child(1) .device-icon {
    color: #598ce6;
  }

  .device-card:nth-child(2) .device-icon {
    color: #4CAF50;
  }

  .device-card:hover .device-icon {
    transform: rotateY(360deg);
  }

  .device-name {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 10px;
    color: #2d4060;
  }

  .device-description {
    font-size: 0.95rem;
    color: #1e293b;
    line-height: 1.6;
  }

  .check-icon {
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 1.5rem;
    color: white;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .device-card.selected .check-icon {
    opacity: 1;
  }

  .connect-btn {
    background: linear-gradient(135deg, #43379e 0%, #4b6cb7 50%, #6b8af7 100%);
    color: white;
    border: none;
    padding: 18px 60px;
    font-size: 1.2rem;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 600;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
    opacity: 0.5;
    pointer-events: none;
  }

  .connect-btn.active {
    opacity: 1;
    pointer-events: all;
  }

  .connect-btn.active:hover {
    background: #6b8af7;
    transform: translateY(-3px);
    box-shadow: 0 4px 12px rgba(107, 138, 247, 0.7);
  }

  .connect-btn:active {
    transform: translateY(-1px);
  }

  .footer {
    margin-top: 40px;
    color: #2d4060;
    font-size: 0.9rem;
  }

  /* Loading spinner */
  .spinner {
    display: none;
    margin: 0 auto 20px;
    width: 50px;
    height: 50px;
    border: 5px solid #d9dff3;
    border-top: 5px solid #6b8af7;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .spinner.show {
    display: block;
  }

  /* Responsive design */
  @media (max-width: 768px) {
    .login-container {
      padding: 30px 20px;
    }

    h1 {
      font-size: 2rem;
    }

    .device-card {
      width: 100%;
      max-width: 300px;
    }

    .device-selection {
      gap: 20px;
    }
  }
  /* Theme Toggle Button */
.theme-toggle-login {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #6269f0, #4b6cb7);
  color: white;
  font-size: 1.2rem;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(75, 108, 183, 0.3);
  transition: all 0.3s ease;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}

.theme-toggle-login:hover {
  transform: scale(1.1) rotate(15deg);
  box-shadow: 0 6px 20px rgba(75, 108, 183, 0.5);
}

.theme-toggle-login:active {
  transform: scale(0.95);
}

/* Dark Mode Styles for Login Page */
body.dark-mode {
  background: linear-gradient(135deg, #0a0e1a 0%, #1a2a4d 50%, #2a4370 100%);
}

body.dark-mode .login-container {
  background: linear-gradient(135deg, #1a2a4d, #2d4060 50%, #152342 50%);
  border-color: rgba(45, 65, 90, 0.5);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.6);
}

body.dark-mode .logo {
  color: #6b8af7;
}

body.dark-mode h1 {
  color: #a3bffa;
}

body.dark-mode .subtitle {
  color: #e0e7ff;
}

body.dark-mode .device-card {
  background: linear-gradient(135deg, #1a2a4d, #2d4060);
  border-color: rgba(45, 65, 90, 0.5);
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
}

body.dark-mode .device-card:hover {
  border-color: #6b8af7;
  box-shadow: 0 8px 20px rgba(107, 138, 247, 0.3);
}

body.dark-mode .device-card.selected {
  background: linear-gradient(135deg, #2a4370, #4b6cb7, #6b8af7);
}

body.dark-mode .device-name {
  color: #a3bffa;
}

body.dark-mode .device-description {
  color: #e0e7ff;
}

body.dark-mode .footer {
  color: #a3bffa;
}

body.dark-mode .spinner {
  border-color: #1a2a4d;
  border-top-color: #6b8af7;
}
</style>
</head>
<body>

    <button class="theme-toggle-login" onclick="toggleLoginTheme()">
    <i class="fas fa-moon"></i>
  </button>

  <div class="login-container">
    <div class="logo">
      <i class="fas fa-microchip"></i>
    </div>
    
    <h1>Serial Monitor</h1>
    <p class="subtitle">Select your device to continue</p>
    
    <div class="device-selection">
      <div class="device-card" onclick="selectDevice('c')">
      <i class="fas fa-check-circle check-icon"></i>
      <div class="device-icon">
        <i class="fab fa-bluetooth-b"></i>
      </div>
      <div class="device-name">C Language</div>
  </div>
  
  <div class="device-card" onclick="selectDevice('python')">
    <i class="fas fa-check-circle check-icon"></i>
    <div class="device-icon">
      <i class="fas fa-signal"></i>
    </div>
    <div class="device-name">Python</div>
  </div>
</div>

    <div class="spinner" id="spinner"></div>
    
    <button class="connect-btn" id="connectBtn"onclick="connectDevice()">
      <i class="fas fa-plug"></i> Connect to Device
    </button>
    
    <div class="footer">
    </div>
  </div>

  <script>
    let selectedDevice = null;

    function selectDevice(device) {
      // Remove selection from all cards
      document.querySelectorAll('.device-card').forEach(card => {
        card.classList.remove('selected');
      });
      
      // Add selection to clicked card
      event.currentTarget.classList.add('selected');
      
      // Store selected device
      selectedDevice = device;
      
      // Enable connect button
      const connectBtn = document.getElementById('connectBtn');
      connectBtn.classList.add('active');
      
      // Store selection in localStorage
      localStorage.setItem('selectedDevice', device);
      
      console.log(`Selected device: ${device}`);
    }

    function connectDevice() {
      if (!selectedDevice) {
        alert('Please select a device first!');
        return;
      }

      // Show loading spinner
      const spinner = document.getElementById('spinner');
      const connectBtn = document.getElementById('connectBtn');
      
      spinner.classList.add('show');
      connectBtn.style.opacity = '0.5';
      connectBtn.style.pointerEvents = 'none';

        // Simulate connection delay
        setTimeout(() => {
        // Store device selection
        localStorage.setItem('selectedDevice', selectedDevice);
        localStorage.setItem('deviceConnected', 'true');
        localStorage.setItem('connectionTime', new Date().toISOString());
        
        // Redirect to main application
        window.location.href = 'index.html';
      }, 1500);
    }

    // Check if device was previously selected
    window.addEventListener('DOMContentLoaded', () => {
      const savedDevice = localStorage.getItem('selectedDevice');
      if (savedDevice) {
        const deviceCard = document.querySelector(`.device-card[onclick*="${savedDevice}"]`);
        if (deviceCard) {
          deviceCard.classList.add('selected');
          selectedDevice = savedDevice;
          document.getElementById('connectBtn').classList.add('active');
        }
      }
    });

    // Add keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && selectedDevice) {
        connectDevice();
      }
    });

    // Theme toggle function
  function toggleLoginTheme() {
    document.body.classList.toggle('dark-mode');
    
    // Save theme preference
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('loginTheme', isDark ? 'dark' : 'light');
    
    // Update icon
    const icon = document.querySelector('.theme-toggle-login i');
    icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
  }

  // Apply saved theme on page load
  window.addEventListener('DOMContentLoaded', () => {
    const savedTheme = localStorage.getItem('loginTheme');
    
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
      document.querySelector('.theme-toggle-login i').className = 'fas fa-sun';
    }
  });
  
  </script>
</body>
</html>
